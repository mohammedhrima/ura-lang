# anvil.toml — flat, one line per thing.
# Paths are relative to this file.

source  = "src"
# `{os}` expands to "mac" / "linux" so Mac and Linux builds don't clobber
# each other when the project directory is shared (e.g. Docker bind-mount).
build   = "build/{os}"
output  = "build/{os}/ura"
ura_lib = "src/ura-lib"

# compiler
llvm    = 14
compile = ["main.c", "parse.c", "gen.c", "utils.c"]

# flags
flags   = ["-Wall", "-Wextra", "-Werror=incompatible-pointer-types", "-Werror=int-conversion", "-g3"]
# Linux-only debug extras. ASan on macOS 14+ deadlocks during shadow-memory
# init before main runs, so we don't ship it as a Mac default.
flags_linux = ["-fsanitize=address", "-fsanitize=undefined", "-fsanitize=null"]
flags_mac   = []
release = ["-O2", "-DDEBUG=0"]

# tests
tests        = "src/tests"
errors       = "src/tests/errors"
max_parallel = 2
ignore_ir    = ["DIFile", "DICompileUnit", "source_filename", "ModuleID"]
# Skip these tests entirely. Entries are paths relative to `tests`.
# Trailing "/" matches a whole folder; a full filename matches one file.
skip         = []

# sync
anvil_repo     = "git@github.com:mohammedhrima/anvil.git"
ura_lib_repo   = "git@github.com:mohammedhrima/ura-lib.git"
extension_repo = "git@github.com:mohammedhrima/ura-vscode-extension.git"
projects_dir   = "src/tests/projects"
project_url    = "git@github.com:mohammedhrima/{name}.git"
