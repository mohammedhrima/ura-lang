# --- Basic Style ---
indent_columns           = 3
indent_with_tabs         = 0
nl_fdef_brace            = add   # Allman style (Brace on new line)
nl_if_brace              = add
nl_switch_brace          = add

# --- Vertical Alignment (The "Table" look) ---
align_var_def_span       = 2     # Align variable names
align_var_def_star_style = 2     # Keep * near the name
align_assign_span        = 2     # Align the = operators
align_assign_thresh      = 12    # Max distance to align

# --- Keep Lines Compact (Prevent Splitting) ---
nl_func_leave_one_liners = true
nl_if_leave_one_liners   = true
nl_start_of_file         = remove
nl_end_of_file           = add